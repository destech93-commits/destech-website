<!-- ONLY REPLACING ORDER SECTION + ADDING SYSTEMS BELOW -->

<section class="section" id="order">

    <div class="order">
      <div class="order-box">
        <h3>Payment & Contact</h3>
        <p><strong>Account Name:</strong> Okunola Comfort</p>

          After payment, send your proof and project details here.
        </p>

      <div class="order-form">
        <h3>Order Form</h3>

      <textarea id="gigDesc"></textarea>
      <button onclick="createGig()">Create Gig</button>
    </div>

  </div>

<!-- 🔥 FIREBASE SYSTEM -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, getDocs,
  doc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* 🔐 CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* =========================
   📦 SAVE ORDER
========================= */
window.saveOrder = async function () {
  const user = auth.currentUser;

  if (!user) {
    alert("Login first");
    return;
  }

  const name = document.querySelector('[name="name"]').value;
  const email = document.querySelector('[name="email"]').value;
  const service = document.querySelector('[name="service"]').value;
  const message = document.querySelector('[name="message"]').value;

  await addDoc(collection(db, "orders"), {
    uid: user.uid,
    name,
    email,
    service,
    message,
    status: "pending",
    createdAt: serverTimestamp()
  });

  alert("Order submitted!");
};

/* =========================
   💬 CHAT SYSTEM
========================= */
const chatRef = collection(db, "messages");

window.sendMessage = async function () {
  const input = document.getElementById("chatInput");
  if (!input.value) return;

  await addDoc(chatRef, {
    text: input.value,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

onSnapshot(query(chatRef, orderBy("createdAt")), snapshot => {
  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  snapshot.forEach(doc => {
    const div = document.createElement("div");
    div.textContent = doc.data().text;
    box.appendChild(div);
  });
});

/* =========================
   📁 FILE UPLOAD
========================= */
window.uploadFile = async function () {
  const file = document.getElementById("fileUpload").files[0];
  if (!file) return alert("Select file");

  const storageRef = ref(storage, "deliveries/" + file.name);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "deliveries"), {
    fileUrl: url,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  alert("Uploaded!");
};

/* =========================
   🛍️ CREATE GIG
========================= */
window.createGig = async function () {
  const title = document.getElementById("gigTitle").value;
  const price = document.getElementById("gigPrice").value;
  const desc = document.getElementById("gigDesc").value;

  await addDoc(collection(db, "gigs"), {
    title, price, desc,
    createdAt: serverTimestamp()
  });

  alert("Gig Created!");
};

/* =========================
   📦 DISPLAY GIGS
========================= */
onSnapshot(collection(db, "gigs"), snapshot => {
  const container = document.getElementById("gigsContainer");
  container.innerHTML = "";

  snapshot.forEach(doc => {
    const g = doc.data();

    const div = document.createElement("div");
    div.innerHTML = `
      <h3>${g.title}</h3>
      <p>${g.desc}</p>
      <strong>₦${g.price}</strong>
    `;

    container.appendChild(div);
  });
});

/* =========================
   💰 WALLET SYSTEM
========================= */
window.addEarning = async function (amount, uid) {
  const userRef = doc(db, "users", uid);

  await updateDoc(userRef, {
    balance: increment(amount),
    totalEarned: increment(amount)
  });

  await addDoc(collection(db, "transactions"), {
    amount,
    type: "credit",
    uid,
    createdAt: serverTimestamp()
  });
};

/* =========================
   👑 ADMIN DATA
========================= */
window.loadAdminData = async function () {
  const orders = await getDocs(collection(db, "orders"));
  const users = await getDocs(collection(db, "users"));

  console.log("Orders:", orders.size);
  console.log("Users:", users.size);
};

/* 🔐 AUTH CHECK */
onAuthStateChanged(auth, user => {
  if (!user) console.log("Not logged in");
});
</script>
