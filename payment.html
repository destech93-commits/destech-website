<script>
const data = JSON.parse(localStorage.getItem("destech_order"));

if(data){
  document.getElementById("summary").innerHTML =
    `<b>${data.service}</b><br>${data.name}<br>${data.email}`;
}

function confirmOrder(){

  const message = `NEW ORDER (DesTech)

Name: ${data.name}
Email: ${data.email}
Service: ${data.service}

Details:
${data.message}
`;

  // Save message so user can copy it
  localStorage.setItem("destech_message", message);

  // Open Instagram
  window.open("https://www.instagram.com/destech2026/", "_blank");

  // Show copy popup
  setTimeout(() => {
    alert("Instagram opened.\n\nCopy your order message on the next screen and send it to @destech2026.");
    showCopyBox();
  }, 800);
}

function showCopyBox(){
  const msg = localStorage.getItem("destech_message");

  const box = document.createElement("div");
  box.style.position = "fixed";
  box.style.bottom = "20px";
  box.style.left = "20px";
  box.style.right = "20px";
  box.style.background = "#111221";
  box.style.padding = "20px";
  box.style.borderRadius = "15px";
  box.style.border = "1px solid rgba(255,255,255,.1)";
  box.style.zIndex = "999";

  box.innerHTML = `
    <h3 style="margin-bottom:10px;">Copy & Send This Message</h3>
    <textarea style="width:100%;height:120px;background:#0b0c15;color:#fff;border:none;padding:10px;border-radius:10px;">${msg}</textarea>
    <button onclick="copyMsg()" style="margin-top:10px;padding:10px 16px;border:none;border-radius:999px;background:#7a00ff;color:#fff;">Copy Message</button>
  `;

  document.body.appendChild(box);
}

function copyMsg(){
  const textarea = document.querySelector("textarea");
  textarea.select();
  document.execCommand("copy");
  alert("Message copied! Now paste it in Instagram DM.");
}
</script>
