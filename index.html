<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  initializeAppCheck, ReCaptchaV3Provider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};
<div id="gigsContainer"></div>
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔐 APP CHECK (SAFE VERSION) */
initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider("YOUR_RECAPTCHA_SITE_KEY"),
  isTokenAutoRefreshEnabled: true
});

/* 🔥 SAVE ORDER */
window.saveOrder = async function () {

  if (!user) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  const name = document.querySelector('input[name="name"]').value.trim();
  const email = document.querySelector('input[name="email"]').value.trim();
  const service = document.querySelector('select[name="service"]').value;
  const message = document.querySelector('textarea[name="message"]').value.trim();

  if (!name || !email || !service || !message) {
    alert("Fill all fields.");
    return;
  }
<input id="gigTitle" placeholder="Gig Title">
<input id="gigPrice" placeholder="Price">
<textarea id="gigDesc"></textarea>
<button onclick="createGig()">Create Gig</button>
  try {
    const docRef = await addDoc(collection(db, "orders"), {
      uid: user.uid,
      name,
      email,
      service,
      message,
      status: "pending",
      createdAt: serverTimestamp()
    });

    /* 🚀 REDIRECT TO DASHBOARD */
    window.location.href = "dashboard.html?order=" + docRef.id;

  } catch (err) {

    alert("Error saving order.");

/* 🔐 AUTO CHECK LOGIN */
onAuthStateChanged(auth, (user) => {

</// =========================
// FIREBASE EXTRA MODULES
// =========================
import {
  collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, getDocs, doc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    match /orders/{id} {
      allow read, write: if request.auth != null;
    }

    match /messages/{id} {
      allow read, write: if request.auth != null;
    }

    match /deliveries/{id} {
      allow read, write: if request.auth != null;
    }

    match /gigs/{id} {
      allow read: if true;
      allow write: if request.auth != null;
    }

    match /users/{id} {
      allow read, write: if request.auth != null;
    }

    match /transactions/{id} {
      allow read, write: if request.auth != null;
    }
  }
}
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const storage = getStorage(app);

// =========================
// 💬 REAL-TIME MESSAGING
// =========================
const chatRef = collection(db, "messages");

window.sendMessage = async function () {
  const input = document.getElementById("chatInput");
  if (!input || !input.value.trim()) return;

  await addDoc(chatRef, {
    text: input.value,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

// LIVE CHAT LISTENER
onSnapshot(query(chatRef, orderBy("createdAt")), (snapshot) => {
  const chatBox = document.getElementById("chatBox");
  if (!chatBox) return;

  chatBox.innerHTML = "";

  snapshot.forEach(doc => {
    const msg = doc.data();
    const div = document.createElement("div");
    div.style.marginBottom = "10px";
    div.textContent = msg.text;
    chatBox.appendChild(div);
  });
});

// =========================
// 📁 FILE UPLOAD (DELIVERY)
// =========================
window.uploadFile = async function () {
  const fileInput = document.getElementById("fileUpload");
  if (!fileInput || !fileInput.files[0]) return alert("Select file");

  const file = fileInput.files[0];
  const storageRef = ref(storage, "deliveries/" + Date.now() + "_" + file.name);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "deliveries"), {
    fileUrl: url,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  alert("File uploaded successfully!");
};

// =========================
// 💰 WALLET / EARNINGS
// =========================
window.addEarning = async function (amount, uid) {
  const userRef = doc(db, "users", uid);

  await updateDoc(userRef, {
    balance: increment(amount),
    totalEarned: increment(amount)
  });

  await addDoc(collection(db, "transactions"), {
    amount,
    type: "credit",
    uid,
    createdAt: serverTimestamp()
  });
};

// =========================
// 🛍️ CREATE GIG (ADMIN)
// =========================
window.createGig = async function () {
  const title = document.getElementById("gigTitle")?.value;
  const price = document.getElementById("gigPrice")?.value;
  const desc = document.getElementById("gigDesc")?.value;

  if (!title || !price || !desc) return alert("Fill all gig fields");

  await addDoc(collection(db, "gigs"), {
    title,
    price,
    desc,
    createdAt: serverTimestamp()
  });

  alert("Gig Created!");
};

// =========================
// 🧾 DISPLAY GIGS (FRONTEND)
// =========================
onSnapshot(collection(db, "gigs"), snapshot => {
  const container = document.getElementById("gigsContainer");
  if (!container) return;

  container.innerHTML = "";

  snapshot.forEach(doc => {
    const gig = doc.data();

    const div = document.createElement("div");
    div.style.marginBottom = "20px";
    div.innerHTML = `
      <h3>${gig.title}</h3>
      <p>${gig.desc}</p>
      <strong>₦${gig.price}</strong>
    `;

    container.appendChild(div);
  });
});

// =========================
// 👑 ADMIN DASHBOARD DATA
// =========================
window.loadAdminData = async function () {
  const ordersSnap = await getDocs(collection(db, "orders"));
  const usersSnap = await getDocs(collection(db, "users"));

  const ordersBox = document.getElementById("ordersList");
  const usersBox = document.getElementById("usersList");

  if (ordersBox) ordersBox.innerHTML = "Orders: " + ordersSnap.size;
  if (usersBox) usersBox.innerHTML = "Users: " + usersSnap.size;
};script>
