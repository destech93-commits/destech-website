<!-- ================= FIREBASE SYSTEM ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, getDocs, doc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* 🔧 PUT YOUR REAL KEYS HERE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* ================= ORDER ================= */
window.saveOrder = async function () {
  const user = auth.currentUser;

  if (!user) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  const name = document.querySelector('[name="name"]').value;
  const email = document.querySelector('[name="email"]').value;
  const service = document.querySelector('[name="service"]').value;
  const message = document.querySelector('[name="message"]').value;

  await addDoc(collection(db, "orders"), {
    uid: user.uid,
    name,
    email,
    service,
    message,
    status: "pending",
    createdAt: serverTimestamp()
  });

  window.location.href = "dashboard.html";
};

/* ================= CHAT ================= */
const chatRef = collection(db, "messages");

window.sendMessage = async function () {
  const input = document.getElementById("chatInput");
  if (!input.value.trim()) return;

  await addDoc(chatRef, {
    text: input.value,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

onSnapshot(query(chatRef, orderBy("createdAt")), (snapshot) => {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  snapshot.forEach(doc => {
    const div = document.createElement("div");
    div.textContent = doc.data().text;
    chatBox.appendChild(div);
  });
});

/* ================= FILE UPLOAD ================= */
window.uploadFile = async function () {
  const file = document.getElementById("fileUpload").files[0];
  if (!file) return alert("Select file");

  const storageRef = ref(storage, "deliveries/" + file.name);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "deliveries"), {
    fileUrl: url,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  alert("Uploaded!");
};

/* ================= GIGS ================= */
onSnapshot(collection(db, "gigs"), snapshot => {
  const container = document.getElementById("gigsContainer");
  container.innerHTML = "";

  snapshot.forEach(doc => {
    const gig = doc.data();

    const div = document.createElement("div");
    div.innerHTML = `
      <h3>${gig.title}</h3>
      <p>${gig.desc}</p>
      <strong>₦${gig.price}</strong>
    `;
    container.appendChild(div);
  });
});

/* ================= WALLET ================= */
window.addEarning = async function (amount, uid) {
  const userRef = doc(db, "users", uid);

  await updateDoc(userRef, {
    balance: increment(amount),
    totalEarned: increment(amount)
  });
};

/* ================= ADMIN ================= */
window.loadAdminData = async function () {
  const ordersSnap = await getDocs(collection(db, "orders"));
  const usersSnap = await getDocs(collection(db, "users"));

  document.getElementById("ordersList").innerHTML = "Orders: " + ordersSnap.size;
  document.getElementById("usersList").innerHTML = "Users: " + usersSnap.size;
};

</script>
