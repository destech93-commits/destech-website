<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DesTech - Premium Design & Web Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:#07070f;color:#fff}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 40px;background:rgba(10,10,20,.72);backdrop-filter:blur(12px)
}

/* LOGO */
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#ff2e7a,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(124,58,237,.4)
}
.logo-icon img{width:70%}
.logo-text{font-weight:800;font-size:1.2rem}
.logo-text span{color:#b56dff}

/* HERO */
.hero{
  min-height:100vh;padding:130px 20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center
}
.hero h1{font-size:3rem;margin-bottom:10px}
.hero p{opacity:.8}

/* GRID */
.grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px
}
.card{
  background:#111221;border-radius:16px;padding:20px
}

/* PORTFOLIO */
.portfolio-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px
}
.portfolio-card{
  border-radius:16px;overflow:hidden;background:#111221
}
.portfolio-card img{width:100%;display:block}

/* ORDER */
.order-wrap{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px
}
.order-box,.order-form{
  background:#111221;padding:20px;border-radius:16px
}
.order-form input,
.order-form select,
.order-form textarea{
  width:100%;margin-bottom:10px;padding:12px;
  border:none;border-radius:10px;background:#0d0e18;color:#fff
}
.btn{
  width:100%;
  background:linear-gradient(135deg,#ff2e7a,#7a00ff);
  border:none;padding:14px;border-radius:20px;color:#fff;font-weight:700
}

/* SECTION */
.section{padding:90px 20px}
.container{max-width:1100px;margin:auto;text-align:center}

/* FOOTER */
.footer{padding:20px;text-align:center;opacity:.7}
</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <img src="images/logo.png" alt="logo">
    </div>
    <div class="logo-text">DES<span>TECH</span></div>
  </div>
</header>

<section class="hero">
  <h1>Designing With Clarity</h1>
  <p>Premium graphic design, branding & web solutions</p>
</section>

<section class="section">
<div class="container">
<h2>Services</h2>

<div class="grid">
<div class="card">Logo Design</div>
<div class="card">Website Design</div>
<div class="card">Branding</div>
<div class="card">Flyer Design</div>
<div class="card">Social Media</div>
<div class="card">Animation</div>
</div>

</div>
</section>

<section class="section">
<div class="container">
<h2>Portfolio</h2>

<div class="portfolio-grid">
<div class="portfolio-card"><img src="images/work1.jpg"></div>
<div class="portfolio-card"><img src="images/work2.jpg"></div>
<div class="portfolio-card"><img src="images/work3.jpg"></div>
</div>

</div>
</section>

<section class="section" id="order">
<div class="container">
<h2>Start Your Project</h2>

<div class="order-wrap">

<div class="order-box">
<p><strong>Account Name:</strong> Okunola Comfort</p>
<p><strong>Account Number:</strong> 08151980291</p>
</div>

<div class="order-form">
<form onsubmit="event.preventDefault(); saveOrder();">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>

<select name="service" required>
<option value="">Select Service</option>
<option>Logo Design</option>
<option>Website Design</option>
<option>Branding</option>
<option>Flyer Design</option>
<option>Social Media Design</option>
<option>Animation</option>
</select>

<textarea name="message" placeholder="Describe your project..." required></textarea>

<button class="btn">Proceed to Payment →</button>

</form>
</div>

</div>
</div>
</section>

<div class="footer">© 2026 DesTech</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { initializeAppCheck, ReCaptchaEnterpriseProvider } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check.js";

const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS",
  storageBucket: "PASTE_YOURS",
  messagingSenderId: "PASTE_YOURS",
  appId: "PASTE_YOURS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

initializeAppCheck(app,{
  provider:new ReCaptchaEnterpriseProvider("YOUR_RECAPTCHA_KEY"),
  isTokenAutoRefreshEnabled:true
});

window.saveOrder = async function(){

const user = auth.currentUser;
if(!user){
  alert("Login first");
  window.location.href="client-login.html";
  return;
}

const name=document.querySelector('input[name="name"]').value.trim();
const email=document.querySelector('input[name="email"]').value.trim();
const service=document.querySelector('select[name="service"]').value;
const message=document.querySelector('textarea[name="message"]').value.trim();

if(!name||!email||!service||!message){
  alert("Fill all fields");
  return;
}

try{
const docRef=await addDoc(collection(db,"orders"),{
ownerUid:user.uid,
name,email,service,message,
status:"pending",
createdAt:serverTimestamp()
});

window.location.href="client-inbox.html?order="+docRef.id;

}catch(e){
alert("Error saving order");
}

}
</script>

</body>
</html>
