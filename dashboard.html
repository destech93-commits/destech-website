<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesTech Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins,sans-serif;
  background:#07070f;
  color:#fff;
}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 30px;
  background:rgba(10,10,20,.75);
  backdrop-filter:blur(10px);
  z-index:100;
}

.logo{font-weight:800}
.logo span{color:#b56dff}

/* LAYOUT */
.dashboard{
  display:grid;
  grid-template-columns:260px 1fr;
  margin-top:80px;
}

/* SIDEBAR */
.sidebar{
  background:#0f1020;
  border-right:1px solid rgba(255,255,255,.06);
  padding:20px;
  height:calc(100vh - 80px);
}

.sidebar h3{
  margin-bottom:20px;
  font-size:1rem;
  opacity:.7;
}

.sidebar a{
  display:block;
  padding:12px 14px;
  margin-bottom:10px;
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.04);
  transition:.25s;
}

.sidebar a:hover{
  background:linear-gradient(135deg,#ff2e7a,#7a00ff);
}

/* CONTENT */
.content{
  padding:30px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:#111221;
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.06);
}

.card h2{
  font-size:1.6rem;
  margin-top:10px;
}

/* ORDERS TABLE */
.orders{
  background:#111221;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
}

.order{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.order:last-child{border-bottom:none}

.order strong{display:block}

.status{
  padding:6px 12px;
  border-radius:999px;
  font-size:.8rem;
}

.pending{background:#ff9f1a}
.completed{background:#2ed573}
.processing{background:#1e90ff}

/* BUTTON */
.btn{
  border:none;
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
  background:linear-gradient(135deg,#ff2e7a,#7a00ff);
  color:#fff;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:40px;
  opacity:.7;
}
</style>
</head>

<body>

<header>
  <div class="logo">DES<span>TECH</span></div>
  <button class="btn" onclick="logout()">Logout</button>
</header>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Dashboard</h3>
    <a href="#">Overview</a>
    <a href="#">Orders</a>
    <a href="#">Messages</a>
    <a href="#">Profile</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <div class="cards">
      <div class="card">
        <small>Total Orders</small>
        <h2 id="totalOrders">0</h2>
      </div>
      <div class="card">
        <small>Pending</small>
        <h2 id="pendingOrders">0</h2>
      </div>
      <div class="card">
        <small>Completed</small>
        <h2 id="completedOrders">0</h2>
      </div>
    </div>

    <div class="orders" id="ordersList">
      <div class="empty">Loading orders...</div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, onSnapshot, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "client-login.html";
    return;
  }

  loadOrders(user.uid);
});

function loadOrders(uid){
  const q = query(collection(db, "orders"), where("ownerUid", "==", uid));

  onSnapshot(q, snapshot => {
    const container = document.getElementById("ordersList");

    if(snapshot.empty){
      container.innerHTML = `<div class="empty">No orders yet</div>`;
      return;
    }

    let total=0, pending=0, completed=0;

    container.innerHTML = '';

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      total++;

      if(data.status === "pending") pending++;
      if(data.status === "completed") completed++;

      const div = document.createElement("div");
      div.className = "order";

      div.innerHTML = `
        <div>
          <strong>${data.service}</strong>
          <small>${data.email}</small>
        </div>
        <div>
          <span class="status ${data.status}">${data.status}</span>
          <button class="btn" onclick="markDone('${docSnap.id}')">Done</button>
        </div>
      `;

      container.appendChild(div);
    });

    document.getElementById("totalOrders").innerText = total;
    document.getElementById("pendingOrders").innerText = pending;
    document.getElementById("completedOrders").innerText = completed;
  });
}

window.markDone = async function(id){
  await updateDoc(doc(db,"orders",id),{
    status:"completed"
  });
}

window.logout = function(){
  signOut(auth);
}
</script>

</body>
</html>
