<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:Poppins,sans-serif;
  background:#07070f;
  color:#fff;
  overflow-x:hidden;
}
header{
  position:fixed;top:0;left:0;right:0;
  z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 40px;background:rgba(10,10,20,.72);backdrop-filter:blur(12px);
}
.logo{font-weight:800}
.logo span{color:#b56dff}
nav a{color:#fff;text-decoration:none;margin-left:18px;opacity:.85}
nav a:hover{opacity:1}
.hero{
  min-height:60vh;padding:130px 20px 80px;text-align:center;position:relative;overflow:hidden
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at top,#7a00ff 0%,#2f155e 40%,#07070f 80%);
  z-index:-2;
}
.hero h1{
  font-size:clamp(2.5rem,5vw,4rem);
  font-weight:800;
  margin-bottom:12px;
}
.hero p{
  max-width:780px;
  margin:0 auto;
  opacity:.8;
  line-height:1.7;
}
.filter-wrap{
  max-width:1000px;
  margin:32px auto 0;
}
.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}
.filters button{
  padding:10px 16px;
  border:none;
  border-radius:999px;
  background:#111221;
  color:#fff;
  cursor:pointer;
  transition:.25s;
  font-weight:600;
}
.filters button:hover,
.filters button.active{
  background:linear-gradient(135deg,#ff2e7a,#7a00ff);
  transform:translateY(-2px);
}
.section{padding:80px 20px}
.container{max-width:1200px;margin:0 auto}
.section h2{
  font-size:clamp(1.8rem,3vw,2.5rem);
  text-align:center;
  margin-bottom:12px;
  font-weight:800;
}
.lead{
  text-align:center;
  max-width:760px;
  margin:0 auto 35px;
  opacity:.8;
  line-height:1.7;
}
.portfolio-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:22px;
}
.portfolio-item{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  background:#111221;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 15px 50px rgba(0,0,0,.4);
  transition:.35s;
  min-height:330px;
}
.portfolio-item:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 80px rgba(122,0,255,.32);
}
.portfolio-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:.45s;
}
.portfolio-item:hover img{
  transform:scale(1.1);
  filter:brightness(1.08) saturate(1.05);
}
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.88) 100%);
  display:flex;
  align-items:flex-end;
  padding:22px;
  opacity:0;
  transition:.35s;
}
.portfolio-item:hover .overlay{opacity:1}
.overlay .content{width:100%}
.overlay h3{
  font-size:1.15rem;
  font-weight:800;
  margin-bottom:6px;
}
.overlay p{
  font-size:.9rem;
  opacity:.78;
  line-height:1.6;
}
.tag{
  display:inline-block;
  margin-bottom:10px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(8px);
  font-size:.78rem;
  font-weight:600;
}
.about-strip{
  max-width:1100px;
  margin:0 auto;
  padding:22px 24px;
  border-radius:18px;
  background:linear-gradient(145deg,#12131d,#0d0e18);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 14px 40px rgba(0,0,0,.26);
  line-height:1.8;
  opacity:.92;
}
footer{
  text-align:center;
  padding:30px 20px;
  border-top:1px solid rgba(255,255,255,.08);
  opacity:.65;
  margin-top:60px;
}
@media(max-width:800px){
  header{padding:16px 16px}
  nav a{margin-left:12px}
  .section{padding:70px 16px}
  .portfolio-item{min-height:300px}
}
