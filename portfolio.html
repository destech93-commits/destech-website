<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - DesTech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* TITLE */
h1{
  text-align:center;
  padding:40px;
  font-size:32px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  padding:40px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:15px;
  overflow:hidden;
  position:relative;
  transform-style:preserve-3d;
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:rotateX(5deg) rotateY(5deg) scale(1.03);
  box-shadow:0 25px 50px rgba(124,58,237,0.4);
}

/* IMAGE */
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.4s;
}

.card:hover img{
  transform:scale(1.1);
}

/* CONTENT */
.card-content{
  padding:20px;
}

.tag{
  font-size:12px;
  opacity:0.7;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#7c3aed;
  padding:5px 10px;
  font-size:12px;
  border-radius:6px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#0b0f1f;
  padding:30px;
  border-radius:15px;
  max-width:500px;
  text-align:center;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  cursor:pointer;
  font-size:24px;
}

</style>
</head>

<body>

<h1>My Portfolio</h1>

<div class="grid">

<div class="card" onclick="openModal('NovaTech Branding Project')">
<div class="badge">Before → After</div>
<img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a">
<div class="card-content">
<h3>NovaTech Solutions</h3>
<p class="tag">Tech Branding & Logo Design</p>
</div>
</div>

<div class="card" onclick="openModal('UrbanNest Website Project')">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
<div class="card-content">
<h3>UrbanNest Realty</h3>
<p class="tag">Real Estate Website</p>
</div>
</div>

<div class="card" onclick="openModal('Veloura Fashion Branding')">
<div class="badge">Premium</div>
<img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb">
<div class="card-content">
<h3>Veloura Fashion</h3>
<p class="tag">Branding + Ads</p>
</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<h2 id="modalText"></h2>
<p>This project includes high-end branding, premium visuals, and conversion-focused design.</p>
</div>
</div>

<script>

function openModal(text){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalText").innerText=text;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
