<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DesTech - Premium Design & Web Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:#07070f;color:#fff}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 40px;background:rgba(10,10,20,.72);
}

/* LOGO */
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#ff2e7a,#7c3aed);
  display:flex;align-items:center;justify-content:center;
}
.logo-icon img{width:70%}
.logo-text{font-weight:800}
.logo-text span{color:#b56dff}

/* HERO */
.hero{padding:140px 20px;text-align:center}
.hero h1{font-size:3rem;margin-bottom:10px}
.hero p{opacity:.8}

/* SECTIONS */
.section{padding:80px 20px}
.container{max-width:1100px;margin:auto}

/* PORTFOLIO */
.portfolio-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px
}
.portfolio-card{
  background:#111221;border-radius:15px;overflow:hidden
}
.portfolio-card img{width:100%;display:block}

/* ORDER */
.order-wrap{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px
}
.order-box,.order-form{
  background:#111221;padding:20px;border-radius:15px
}
.order-form input,
.order-form select,
.order-form textarea{
  width:100%;margin-bottom:10px;padding:10px;
  border:none;border-radius:8px;background:#0d0e18;color:#fff
}
.btn{
  background:linear-gradient(135deg,#ff2e7a,#7a00ff);
  padding:12px;border:none;border-radius:20px;color:#fff;width:100%;
  cursor:pointer
}

/* FOOTER */
.footer{text-align:center;padding:20px;opacity:.6}
</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <img src="images/logo.png" alt="logo">
    </div>
    <div class="logo-text">DES<span>TECH</span></div>
  </div>
</header>

<section class="hero">
  <h1>Premium Design for Modern Brands</h1>
  <p>Logo, Branding, Websites & Creative Solutions</p>
</section>

<section class="section" id="portfolio">
  <div class="container">
    <h2>Portfolio</h2>

    <div class="portfolio-grid">
      <div class="portfolio-card">
        <img src="images/work1.jpg">
      </div>
      <div class="portfolio-card">
        <img src="images/work2.jpg">
      </div>
      <div class="portfolio-card">
        <img src="images/work3.jpg">
      </div>
    </div>

  </div>
</section>

<section class="section" id="order">
  <div class="container">
    <h2>Start Your Project</h2>

    <div class="order-wrap">

      <div class="order-box">
        <p><strong>Account Name:</strong> Okunola Comfort</p>
        <p><strong>Account Number:</strong> 08151980291</p>
      </div>

      <div class="order-form">
        <form onsubmit="event.preventDefault(); saveOrder();">
          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Your Email" required>

          <select name="service" required>
            <option value="">Select Service</option>
            <option>Logo Design</option>
            <option>Website Design</option>
            <option>Branding</option>
          </select>

          <textarea name="message" placeholder="Describe your project..." required></textarea>

          <button class="btn">Submit Order</button>
        </form>
      </div>

    </div>
  </div>
</section>

<div class="footer">© 2026 DesTech</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { initializeAppCheck, ReCaptchaEnterpriseProvider } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

initializeAppCheck(app, {
  provider: new ReCaptchaEnterpriseProvider("YOUR_RECAPTCHA_KEY"),
  isTokenAutoRefreshEnabled: true
});

window.saveOrder = async function(){
  const name = document.querySelector('input[name="name"]').value;
  const email = document.querySelector('input[name="email"]').value;
  const service = document.querySelector('select[name="service"]').value;
  const message = document.querySelector('textarea[name="message"]').value;

  if(!name || !email || !service || !message){
    alert("Fill all fields");
    return;
  }

  try{
    await addDoc(collection(db,"orders"),{
      name,email,service,message,
      status:"pending",
      createdAt:serverTimestamp()
    });

    alert("Order sent!");
  }catch(e){
    alert("Error saving order");
  }
}
</script>

</body>
</html>
