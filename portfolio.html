<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - DesTech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

h1{
  text-align:center;
  padding:40px;
  font-size:32px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  padding:40px;
}

.card{
  background:#0b0f1f;
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
  position:relative;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 20px 40px rgba(124,58,237,0.4);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.card h3{
  margin:0;
}

.tag{
  font-size:12px;
  opacity:0.7;
}

/* BEFORE / AFTER LABEL */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#7c3aed;
  padding:5px 10px;
  font-size:12px;
  border-radius:6px;
}

/* GLOW EFFECT */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:15px;
  box-shadow:0 0 20px rgba(124,58,237,0.2);
  opacity:0;
  transition:0.3s;
}

.card:hover::after{
  opacity:1;
}

</style>
</head>

<body>

<h1>My Portfolio</h1>

<div class="grid">

<!-- PROJECT 1 -->
<div class="card">
<div class="badge">Before → After</div>
<img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a">
<div class="card-content">
<h3>NovaTech Solutions</h3>
<p class="tag">Tech Branding & Logo Design</p>
</div>
</div>

<!-- PROJECT 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
<div class="card-content">
<h3>UrbanNest Realty</h3>
<p class="tag">Real Estate Website</p>
</div>
</div>

<!-- PROJECT 3 -->
<div class="card">
<div class="badge">Premium Design</div>
<img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb">
<div class="card-content">
<h3>Veloura Fashion</h3>
<p class="tag">Fashion Branding + Ads</p>
</div>
</div>

<!-- PROJECT 4 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<div class="card-content">
<h3>Skyline Logistics</h3>
<p class="tag">Corporate Website Design</p>
</div>
</div>

<!-- PROJECT 5 -->
<div class="card">
<div class="badge">Ad Campaign</div>
<img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2">
<div class="card-content">
<h3>Glow Beauty</h3>
<p class="tag">Instagram Ads Design</p>
</div>
</div>

<!-- PROJECT 6 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<div class="card-content">
<h3>PrimeCars</h3>
<p class="tag">Automotive Website</p>
</div>
</div>

</div>

</body>
</html>
