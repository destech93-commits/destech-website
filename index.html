<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:#050510;color:#fff}

/* NAV */
header{
position:fixed;width:100%;z-index:100;
display:flex;justify-content:space-between;
padding:20px 8%;
background:rgba(0,0,0,.6);
backdrop-filter:blur(12px)
}
.logo{font-weight:800}
.logo span{color:#b56dff}
nav a{color:#fff;margin-left:20px;text-decoration:none}

/* HERO */
.hero{
height:100vh;
display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center;
background:radial-gradient(circle at top,#7a00ff,#050510);
position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
width:600px;height:600px;
background:radial-gradient(circle,#c400ff,transparent);
filter:blur(150px);
animation:move 10s infinite alternate;
}

@keyframes move{
0%{transform:translate(-100px,-100px)}
100%{transform:translate(100px,100px)}
}

.hero h1{
font-size:clamp(2.5rem,5vw,4rem);
font-weight:800;
margin-bottom:20px;
}

/* SEARCH */
.search{
margin-top:20px;
display:flex;
background:#fff;
border-radius:50px;
overflow:hidden;
width:90%;
max-width:500px;
}

.search input{
flex:1;padding:14px;border:none;outline:none;
}
.search button{
background:#ff2e7a;color:#fff;border:none;padding:0 20px;
}

/* CATEGORY QUICK NAV */
.quick{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
padding:30px 20px;
}

.quick button{
background:#111;
border:none;
padding:10px 15px;
border-radius:20px;
color:#fff;
cursor:pointer;
}

/* SECTION */
.section{padding:80px 20px}
.container{max-width:1100px;margin:auto}

/* SERVICES SAME AS YOUR STRUCTURE */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

.card{
background:#111;
padding:20px;
border-radius:15px;
transition:.3s;
}
.card:hover{transform:translateY(-5px);background:#7a00ff}

/* PORTFOLIO */
.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.portfolio img{
width:100%;
border-radius:15px;
transition:.4s;
}
.portfolio img:hover{transform:scale(1.05)}

/* ORDER FIXED */
.order{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.order input,.order textarea{
padding:12px;
border:none;
border-radius:8px;
background:#111;
color:#fff;
}

button{
padding:12px;
background:linear-gradient(135deg,#ff2e7a,#7a00ff);
border:none;
color:#fff;
border-radius:8px;
cursor:pointer;
}

/* FLOAT BUTTON */
.insta{
position:fixed;
right:20px;
bottom:20px;
background:linear-gradient(135deg,#ff2e7a,#7a00ff);
padding:15px;
border-radius:50%;
color:#fff;
text-decoration:none;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
opacity:.6;
}
</style>
</head>

<body>

<header>
<div class="logo">DES<span>TECH</span></div>
<nav>
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="about.html">About</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<h1>Premium Designs That Convert</h1>

<div class="search">
<input id="searchInput" placeholder="Type any services...">
<button>🔍</button>
</div>
</section>

<!-- QUICK NAV -->
<div class="quick">
<button onclick="scrollToSection('logo')">Logo</button>
<button onclick="scrollToSection('website')">Website</button>
<button onclick="scrollToSection('branding')">Branding</button>
<button onclick="scrollToSection('flyers')">Flyer</button>
</div>

<!-- SERVICES -->
<section id="services" class="section">
<div class="container">

<div class="grid">
<div class="card" onclick="scrollToSection('logo')">Logo Design</div>
<div class="card" onclick="scrollToSection('website')">Website Design</div>
<div class="card" onclick="scrollToSection('branding')">Branding</div>
<div class="card" onclick="scrollToSection('flyers')">Flyer Design</div>
</div>

</div>
</section>

<!-- PORTFOLIO -->
<section class="section">
<div class="container">
<h2>Portfolio</h2>
<div class="portfolio">
<img src="images/work1.jpg">
<img src="images/work2.jpg">
<img src="images/work3.jpg">
</div>
</div>
</section>

<!-- ORDER -->
<section class="section" id="order">
<div class="container">
<h2>Order</h2>

<div class="order">
<input id="selectedService" placeholder="Selected service">
<input id="clientEmail" placeholder="Your email">
<textarea id="projectDetails" placeholder="Project details"></textarea>

<p>Pay via Opay: <b>08151980291</b></p>

<button onclick="sendMail()">Submit</button>
</div>

</div>
</section>

<a href="https://instagram.com/destech2026" class="insta">📩</a>

<footer>
<p>© 2026 Destech</p>
</footer>

<script>
function scrollToSection(id){
document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
}

function sendMail(){
const s=document.getElementById('selectedService').value;
const e=document.getElementById('clientEmail').value;
const d=document.getElementById('projectDetails').value;

window.location.href=`mailto:desmondroder93@gmail.com?subject=Order-${s}&body=Email:${e}%0AService:${s}%0ADetails:${d}`;
}

/* typing animation */
const texts=["Type any services...","Logo Design","Website Design","Branding","Flyer Design"];
let i=0,j=0,current="",del=false;

function type(){
if(i<texts.length){
if(!del && j<=texts[i].length){
current=texts[i].substring(0,j++);
}else if(del && j>=0){
current=texts[i].substring(0,j--);
}
document.getElementById("searchInput").placeholder=current;

if(j==texts[i].length){del=true;}
if(j==0){del=false;i++;}
}
setTimeout(type,100);
}
type();
</script>

</body>
</html>
