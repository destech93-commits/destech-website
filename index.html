<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  margin:0;
}

h1{
  text-align:center;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#0b0f1f;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:10px;
}

</style>
</head>

<body>

<h1 id="title">Results</h1>

<div class="grid" id="results"></div>

<script>

const services = [
  {
    name:"Logo Design",
    image:"https://images.unsplash.com/photo-1586717791821-3f44a563fa4c",
    link:"services.html#logo"
  },
  {
    name:"Website Design",
    image:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d",
    link:"services.html#website"
  },
  {
    name:"Branding",
    image:"https://images.unsplash.com/photo-1542744173-8e7e53415bb0",
    link:"services.html#branding"
  },
  {
    name:"Flyer Design",
    image:"https://images.unsplash.com/photo-1581090700227-1e8a2d4b6f9c",
    link:"services.html#flyer"
  },
  {
    name:"Brochure Design",
    image:"https://images.unsplash.com/photo-1559028012-481c04fa702d",
    link:"services.html#brochure"
  }
];

// GET QUERY
const params = new URLSearchParams(window.location.search);
const query = params.get("q")?.toLowerCase() || "";

document.getElementById("title").innerText = "Results for: " + query;

// FILTER
const filtered = services.filter(service =>
  service.name.toLowerCase().includes(query)
);

const container = document.getElementById("results");

// DISPLAY
if(filtered.length === 0){
  container.innerHTML = "<p>No results found</p>";
}else{
  filtered.forEach(service=>{
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${service.image}">
      <h3>${service.name}</h3>
    `;
    div.onclick = ()=> window.location.href = service.link;
    container.appendChild(div);
  });
}

</script>

</body>
</html>
